server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Serve graph.mmd from the shared volume
    location = /graph.mmd {
        alias /var/graph/graph.mmd;
        add_header Content-Type text/plain;
    }
    
    location ~* \.mmd$ {
        add_header Content-Type text/plain;
    }
}
