version: '3.8'

services:
  docker-gen:
    image: nginxproxy/docker-gen:latest
    container_name: docker-gen
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./templates:/etc/docker-gen/templates:ro
      - ./web:/output
    command: -watch /etc/docker-gen/templates/mermaid.tmpl /output/graph.mmd
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: mermaid-web
    ports:
      - "6498:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
